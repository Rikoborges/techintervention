<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InterventionConnect</title>
  <meta name="description" content="Gestion des interventions techniques — fibre optique, électricité, hydraulique, climatisation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #111827;
      --card:     #1f2937;
      --input:    #111827;
      --border:   #374151;
      --text:     #f1f5f9;
      --sub:      #94a3b8;
      --accent:   #60a5fa;
      --radius:   10px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: clamp(1rem, 4vw, 2rem);
      font-size: 15px;
    }

    /* ── Header ── */
    header {
      max-width: 880px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 42px; height: 42px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .logo-text h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 0.8rem;
      color: var(--sub);
      margin-top: 2px;
    }

    .online {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.78rem;
      color: #4ade80;
      font-weight: 500;
    }

    .dot {
      width: 7px; height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: blink 2s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Layout ── */
    .wrap { max-width: 880px; margin: 0 auto; display: grid; gap: 1.25rem; }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .card-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .card-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--sub);
    }

    /* ── Form ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 0.9rem;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--sub);
    }

    input, select {
      width: 100%;
      padding: 0.55rem 0.8rem;
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    input::placeholder { color: #4b5563; }
    select option { background: #1f2937; }

    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.6);
      cursor: pointer;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.6rem 1.4rem;
      background: var(--accent);
      color: #0f172a;
      font-weight: 600;
      font-size: 0.875rem;
      font-family: 'Inter', sans-serif;
      border: none; border-radius: 7px;
      cursor: pointer;
      margin-top: 1rem;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }

    .btn-sm {
      background: #374151;
      color: var(--text);
      font-size: 0.78rem;
      padding: 0.38rem 0.75rem;
      margin-top: 0;
    }

    .btn-sm:hover { background: #4b5563; opacity: 1; }

    /* ── Toast ── */
    .toast {
      display: none;
      margin-top: 0.9rem;
      padding: 0.65rem 1rem;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 500;
      border-left: 3px solid;
    }

    .toast.ok  { display:block; background:#052e16; color:#86efac; border-color:#22c55e; }
    .toast.err { display:block; background:#450a0a; color:#fca5a5; border-color:#ef4444; }

    /* ── Filters ── */
    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filters select { width: auto; padding: 0.35rem 0.65rem; font-size: 0.8rem; }

    /* ── Stats ── */
    .stats {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      background: #111827;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      margin-bottom: 1.1rem;
    }

    .stat { display: flex; flex-direction: column; gap: 2px; min-width: 60px; }

    .stat-n {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
    }

    .stat-l {
      font-size: 0.7rem;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Table ── */
    .tbl-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    th {
      text-align: left;
      padding: 0.55rem 0.75rem;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--sub);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 0.75rem;
      border-bottom: 1px solid #1f2937;
      font-size: 0.875rem;
      color: var(--text);
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #263244; }

    .name { font-weight: 500; }
    .sub-text { font-size: 0.78rem; color: var(--sub); margin-top: 2px; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    /* Statuts */
    .s-en_attente { background: #1e3a5f; color: #93c5fd; }
    .s-en_cours   { background: #431407; color: #fdba74; }
    .s-termine    { background: #052e16; color: #86efac; }
    .s-annule     { background: #450a0a; color: #fca5a5; }

    /* Priorités */
    .p-basse   { background: #052e16; color: #86efac; }
    .p-normale { background: #1e3a5f; color: #93c5fd; }
    .p-haute   { background: #431407; color: #fdba74; }
    .p-urgente { background: #450a0a; color: #fca5a5; }

    .empty {
      text-align: center; padding: 2.5rem;
      color: var(--sub); font-size: 0.875rem;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      th:nth-child(3), td:nth-child(3),
      th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">🔧</div>
    <div class="logo-text">
      <h1>InterventionConnect</h1>
      <p>Gestion des interventions techniques</p>
    </div>
    <div class="online"><span class="dot"></span> En ligne</div>
  </header>

  <div class="wrap">

    <!-- Formulaire -->
    <div class="card">
      <div class="card-head">
        <span class="card-label">Nouvelle intervention</span>
      </div>
      <div class="grid">
        <div class="field">
          <label>Technicien</label>
          <input type="text" id="technicien" placeholder="Jean Dupont">
        </div>
        <div class="field">
          <label>Client</label>
          <input type="text" id="client" placeholder="Résidence Les Pins">
        </div>
        <div class="field">
          <label>Type</label>
          <select id="typeIntervention">
            <option value="fibre_optique">Fibre optique</option>
            <option value="electricite">Électricité</option>
            <option value="hydraulique">Hydraulique</option>
            <option value="climatisation">Climatisation</option>
          </select>
        </div>
        <div class="field">
          <label>Priorité</label>
          <select id="priorite">
            <option value="basse">Basse</option>
            <option value="normale" selected>Normale</option>
            <option value="haute">Haute</option>
            <option value="urgente">Urgente</option>
          </select>
        </div>
        <div class="field full">
          <label>Adresse</label>
          <input type="text" id="adresse" placeholder="12 rue de la Paix, 75001 Paris">
        </div>
        <div class="field full">
          <label>Date d'intervention</label>
          <input type="datetime-local" id="dateIntervention">
        </div>
        <div class="field full">
          <label>Notes (optionnel)</label>
          <input type="text" id="notes" placeholder="Informations complémentaires...">
        </div>
      </div>
      <button class="btn" onclick="creerIntervention()">+ Créer l'intervention</button>
      <div class="toast" id="toast"></div>
    </div>

    <!-- Liste -->
    <div class="card">
      <div class="card-head">
        <span class="card-label">Interventions</span>
        <div class="filters">
          <select id="filtreStatut" onchange="chargerInterventions()">
            <option value="">Tous statuts</option>
            <option value="en_attente">En attente</option>
            <option value="en_cours">En cours</option>
            <option value="termine">Terminé</option>
            <option value="annule">Annulé</option>
          </select>
          <select id="filtreType" onchange="chargerInterventions()">
            <option value="">Tous types</option>
            <option value="fibre_optique">Fibre optique</option>
            <option value="electricite">Électricité</option>
            <option value="hydraulique">Hydraulique</option>
            <option value="climatisation">Climatisation</option>
          </select>
          <button class="btn btn-sm" onclick="chargerInterventions()">↻ Actualiser</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><span class="stat-n" id="s-total">—</span><span class="stat-l">Total</span></div>
        <div class="stat"><span class="stat-n" id="s-attente">—</span><span class="stat-l">En attente</span></div>
        <div class="stat"><span class="stat-n" id="s-cours">—</span><span class="stat-l">En cours</span></div>
        <div class="stat"><span class="stat-n" id="s-termine">—</span><span class="stat-l">Terminées</span></div>
      </div>

      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Technicien / Client</th>
              <th>Type</th>
              <th>Priorité</th>
              <th>Statut</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="liste">
            <tr><td colspan="5"><div class="empty">Chargement...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    const API = '/api/interventions';
    const H = { 'Content-Type': 'application/json', 'x-api-key': 'techintervention2026' };

    async function creerIntervention() {
      const toast = document.getElementById('toast');
      const dv = document.getElementById('dateIntervention').value;
      const body = {
        technicien: document.getElementById('technicien').value,
        client: document.getElementById('client').value,
        typeIntervention: document.getElementById('typeIntervention').value,
        priorite: document.getElementById('priorite').value,
        adresse: document.getElementById('adresse').value,
        dateIntervention: dv ? new Date(dv).toISOString() : '',
        notes: document.getElementById('notes').value || undefined,
      };
      try {
        const res = await fetch(API, { method: 'POST', headers: H, body: JSON.stringify(body) });
        const data = await res.json();
        if (res.ok) {
          toast.className = 'toast ok';
          toast.textContent = '✓ Intervention créée avec succès';
          chargerInterventions();
        } else {
          toast.className = 'toast err';
          toast.textContent = '✕ ' + (data.erreurs?.[0]?.message || data.message || 'Erreur');
        }
      } catch {
        toast.className = 'toast err';
        toast.textContent = '✕ Impossible de contacter l\'API';
      }
      setTimeout(() => { toast.className = 'toast'; }, 5000);
    }

    async function chargerInterventions() {
      const statut = document.getElementById('filtreStatut').value;
      const type = document.getElementById('filtreType').value;
      const liste = document.getElementById('liste');
      const p = new URLSearchParams();
      if (statut) p.append('statut', statut);
      if (type) p.append('type', type);
      const url = API + (p.toString() ? '?' + p : '');
      try {
        const res = await fetch(url, { headers: H });
        const data = await res.json();
        document.getElementById('s-total').textContent   = data.total ?? 0;
        document.getElementById('s-attente').textContent = data.data?.filter(i => i.statut === 'en_attente').length ?? 0;
        document.getElementById('s-cours').textContent   = data.data?.filter(i => i.statut === 'en_cours').length ?? 0;
        document.getElementById('s-termine').textContent = data.data?.filter(i => i.statut === 'termine').length ?? 0;
        if (!data.data?.length) {
          liste.innerHTML = '<tr><td colspan="5"><div class="empty">Aucune intervention trouvée</div></td></tr>';
          return;
        }
        liste.innerHTML = data.data.map(i => {
          const date = new Date(i.dateIntervention).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' });
          return `<tr>
            <td><div class="name">${i.technicien}</div><div class="sub-text">${i.client}</div></td>
            <td style="color:var(--sub);font-size:0.8rem">${i.typeIntervention.replace(/_/g,' ')}</td>
            <td><span class="badge p-${i.priorite}">${i.priorite}</span></td>
            <td><span class="badge s-${i.statut}">${i.statut.replace(/_/g,' ')}</span></td>
            <td style="color:var(--sub);font-size:0.8rem">${date}</td>
          </tr>`;
        }).join('');
      } catch {
        liste.innerHTML = '<tr><td colspan="5"><div class="empty">Erreur de connexion à l\'API</div></td></tr>';
      }
    }

    chargerInterventions();
  </script>
</body>
</html>
